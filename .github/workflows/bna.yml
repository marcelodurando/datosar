name: Scrape BNA

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Scrape BNA
        run: |
          mkdir -p datos

          cat > scraper.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'fs';

          const browser = await chromium.launch({
            headless: true
          });

          const page = await browser.newPage({
            viewport: { width: 1600, height: 900 }
          });

          console.log("Opening BNA...");

          await page.goto("https://bna.com.ar/Personas", {
            waitUntil: "networkidle",
            timeout: 120000
          });

          // Give the page a few seconds in case content loads after network idle
          await page.waitForTimeout(5000);

          fs.writeFileSync("datos/bna.html", await page.content());

          console.log("Saved datos/bna.html");

          await browser.close();
          EOF

          node scraper.mjs

      - name: Commit updated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add datos/bna.html

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Update BNA HTML"
          git push
